
    <div class="auth-root">
      <div class="auth-card">
        <div class="logo">
          <img src="img/logo/logo.png" alt="BetPool Logo" class="logo-image">
          <span class="logo-bet">Bet</span><span class="logo-pool">Pool</span>
        </div>
        <h1 class="auth-title">Verify OTP</h1>
        <p class="auth-subtitle">Enter the 6-digit code sent to {{ store.phone() }}</p>

        <div class="otp-container">
          @for (idx of [0,1,2,3,4,5]; track idx) {
            <input
              #otpInput
              class="otp-box"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              autocomplete="one-time-code"
              (input)="onInput($event, idx)"
              (keydown)="onKeydown($event, idx)"
              (focus)="onFocus($event)"
              [value]="otpDigits[idx] || ''"
            />
          }
        </div>

        <button class="btn-primary" (click)="verifyOtp()" [disabled]="otpDigits.join('').length < 6 || store.loading()">
          @if (store.loading()) { <span class="spinner"></span> }
          Verify OTP
        </button>

        <div class="resend-row">
          @if (store.resendCountdown() > 0) {
            <span class="resend-timer">Resend code in {{ store.resendCountdown() }}s</span>
          } @else {
            <button class="resend-btn" (click)="resendOtp()" [disabled]="store.loading()">Resend OTP</button>
          }
        </div>

        @if (store.error()) {
          <div class="error-msg">{{ store.error() }}</div>
        }
      </div>
    </div>
